name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main     # Triggers when you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Generate deployment package (ZIP)
        run: zip -r deploy-package.zip . -x '*.git*'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 2026 AWS Native Elastic Beanstalk Deployer
      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1
        with:
          application-name: node-express-app
          environment-name: node-express-env
          version-label: "ver-${{ github.sha }}"
          region: us-east-1
          deployment-package-path: deploy-package.zip
